services:
  db:
    image: mysql:8.0
    container_name: simplerpg-db
    restart: unless-stopped
    env_file: ./docker/.env
    ports:
      - "3306:3306"
    volumes:
      - simplerpg-mysql-data:/var/lib/mysql
      - ./docker/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  simplerpg-mysql-data: